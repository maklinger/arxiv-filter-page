page:
  title: "Marc's arXiv filters"
  timezone: "UTC"

filters:

  - title: "GRB afterglows"
    categories: ["astro-ph.HE", "astro-ph.CO", "astro-ph.SR", "gr-qc"]
    numberlimit: 200
    max_results: 200
    layout: "default"
    keywords:
      title:
        - "GRB"
        - "gamma-ray burst"
        - "afterglow"
      abstract:
        - "GRB"
        - "gamma-ray burst"
        - "afterglow"

  - title: "VHE GRBs"
    categories: ["astro-ph.HE", "astro-ph.CO", "gr-qc"]
    numberlimit: 100
    max_results: 200
    layout: "default"
    keywords:
      title:
        - "221009"
        - "BOAT"
        - "190114"
        - "190829"
        - "TeV GRB"
        - "very high energy GRB"
      abstract:
        - "221009"
        - "BOAT"
        - "190114"
        - "190829"
        - "TeV GRB"
        - "very high energy GRB"

  - title: "M87"
    categories: ["astro-ph.HE", "astro-ph.GA", "astro-ph.CO"]
    numberlimit: 100
    max_results: 200
    layout: "default"
    keywords:
      title:
        - "M87"
        - "NGC 4486"
        # - "Virgo A"
        - "3C 274"
      abstract:
        - "M87"
        - "NGC 4486"
        # - "Virgo A" 
        - "3C 274"

  - title: "GRMHD"
    categories: ["astro-ph.HE", "astro-ph.GA", "gr-qc"]
    numberlimit: 100
    max_results: 200
    layout: "default"
    keywords:
      title:
        - "GRMHD"
        - "general relativistic magnetohydrodynamic"
        - "general-relativistic magnetohydrodynamic"
        - "relativistic MHD"
      abstract:
        - "GRMHD"
        - "general relativistic magnetohydrodynamic"
        - "general-relativistic magnetohydrodynamic"

  - title: "PIC & acceleration"
    categories: ["astro-ph.HE", "astro-ph.SR", "physics.plasm-ph"]
    numberlimit: 100
    max_results: 200
    layout: "default"
    keywords:
      title:
        - "particle-in-cell"
        - "PIC simulation"
        - "Fermi acceleration"
        - "diffusive shock acceleration"
        - "magnetic reconnection"
        - "shock acceleration"
        - "non-thermal particle"
      abstract:
        - "particle-in-cell"
        - "PIC simulation"
        - "Fermi acceleration"
        - "diffusive shock acceleration"
        - "magnetic reconnection"
        - "shock acceleration"

  - title: "Microquasars & XRBs"
    categories: ["astro-ph.HE", "astro-ph.SR"]
    numberlimit: 100
    max_results: 200
    layout: "default"
    keywords:
      title:
        - "microquasar"
        - "X-ray binary"
        - "XRB"
        - "HMXB"
        - "LMXB"
        - "gamma-ray binary"
        - "SS 433"
        - "Cyg X-1"
        - "Cyg X-3"
        - "LS I"
        - "LS 5039"
        - "V4641"
        - "GRS1915"
      abstract:
        - "microquasar"
        - "X-ray binary"
        - "gamma-ray binary"
        - "relativistic jet"

  - title: "HE last week"
    categories: ["astro-ph.HE"]
    days: 7
    max_results: 500
    layout: "default"
    # no keywords — returns everything in astro-ph.HE from the past 7 days

  - title: "Me"
    categories: ["astro-ph.HE"]
    layout: "default"
    keywords:
      authors:
        - "Klinger, Marc"
        - "Marc Klinger-Plaisier"
